<!DOCTYPE html>
<!-- build 2026-07-19-v4 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Battle Royale - HUD Prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0f; color: #f0f0f0; overflow: hidden;
      width: 100vw; height: 100vh; touch-action: none;
    }
    #app { width: 100vw; height: 100vh; position: relative; }

    /* Temporary cinematic backdrop: animated grid + vignette */
    .backdrop {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(180deg, #0d0d12 0%, #1a1a2e 100%);
      overflow: hidden;
    }
    .backdrop::before {
      content: ''; position: absolute; inset: -50%;
      background-image:
        linear-gradient(rgba(0,180,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,180,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 8s linear infinite;
    }
    @keyframes gridMove {
      from { transform: translate(0, 0); }
      to { transform: translate(60px, 60px); }
    }
    .backdrop::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.8) 100%);
      pointer-events: none;
    }

    /* Loading */
    #loading {
      position: fixed; inset: 0; z-index: 999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; background: #0a0a0f;
      transition: opacity 0.3s;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #2a2a3a; border-top-color: #00b4ff;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #ui {
      position: fixed; inset: 0; pointer-events: none; z-index: 100;
    }

    /* === HUD === */
    .hud {
      position: absolute; bottom: 24px; left: 24px; right: 24px;
      display: flex; justify-content: space-between; align-items: flex-end;
      gap: 1rem; pointer-events: none;
    }
    .hud-panel {
      background: rgba(15,15,20,0.85); border: 1px solid rgba(60,60,80,0.5);
      border-radius: 8px; padding: 12px 16px;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      pointer-events: auto;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-label {
      color: rgba(160,160,180,0.7); font-size: 9px;
      text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600;
    }
    .stat-value {
      color: #fff; font-size: 22px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace; line-height: 1;
    }

    /* Health bar */
    .health-bar-wrap { display: flex; flex-direction: column; gap: 6px; }
    .health-bar {
      width: 200px; height: 8px;
      background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
    }
    .health-bar-fill {
      height: 100%; background: linear-gradient(90deg, #00ff88, #00cc66);
      transition: width 0.3s ease, background 0.3s; width: 100%;
    }
    .health-bar-fill.low { background: linear-gradient(90deg, #ffcc00, #ff8800); }
    .health-bar-fill.critical { background: linear-gradient(90deg, #ff3300, #cc0000); animation: pulseRed 0.8s infinite; }
    .health-bar-fill.gas-poisoned { background: linear-gradient(90deg, #8a3a2e, #6e2a1e); filter: grayscale(0.4) saturate(0.6); }
    @keyframes pulseRed { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* === Crosshair === */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%); z-index: 60;
      pointer-events: none; opacity: 0.7;
    }
    #crosshair .ch-line {
      position: absolute; background: #00b4ff;
    }
    #crosshair .ch-top, #crosshair .ch-bottom { width: 2px; height: 8px; left: -1px; }
    #crosshair .ch-top { top: -12px; }
    #crosshair .ch-bottom { top: 4px; }
    #crosshair .ch-left, #crosshair .ch-right { width: 8px; height: 2px; top: -1px; }
    #crosshair .ch-left { left: -12px; }
    #crosshair .ch-right { left: 4px; }

    /* === Weapon HUD === */
    .weapon-hud {
      position: absolute; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: rgba(15,15,20,0.85); border: 1px solid rgba(60,60,80,0.5);
      border-radius: 8px; padding: 10px 18px;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      display: flex; align-items: center; gap: 1.2rem;
      pointer-events: auto;
    }
    .ammo-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px; font-weight: 700; line-height: 1;
    }
    .ammo-current { color: #00b4ff; }
    .ammo-total { color: rgba(160,160,180,0.6); font-size: 18px; }
    .ammo-divider { color: rgba(160,160,180,0.3); }
    .fire-mode {
      font-size: 10px; color: #ff8c00;
      text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700;
    }
    .weapon-name {
      color: rgba(240,240,255,0.8); font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    /* === Minimap/Radar (bottom-left) === */
    .radar {
      position: absolute; bottom: 100px; left: 24px;
      width: 180px; height: 180px;
      border-radius: 12px; overflow: hidden;
      background: rgba(15,15,20,0.9);
      border: 1px solid rgba(60,60,80,0.5);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      pointer-events: auto;
    }
    .radar canvas { width: 100%; height: 100%; display: block; }
    .radar-north {
      position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
      color: #00b4ff; font-size: 11px; font-weight: 700;
      text-shadow: 0 0 4px rgba(0,180,255,0.6);
      pointer-events: none; z-index: 2;
    }
    .radar-ping {
      position: absolute; top: 50%; left: 50%;
      width: 20px; height: 20px; border-radius: 50%;
      border: 1px solid rgba(0,180,255,0.6);
      transform: translate(-50%, -50%);
      pointer-events: none;
      animation: ping 2s ease-out infinite;
    }
    @keyframes ping {
      0% { width: 4px; height: 4px; opacity: 1; }
      100% { width: 180px; height: 180px; opacity: 0; }
    }

    /* === Zone warning === */
    .zone-warning {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; pointer-events: none;
      opacity: 0; transition: opacity 0.3s; z-index: 70;
    }
    .zone-warning.visible { opacity: 1; }
    .zone-warning-text {
      font-size: 1.5rem; font-weight: 700; color: #dc3232;
      text-shadow: 0 0 20px rgba(220,50,50,0.6);
      letter-spacing: 0.05em; text-transform: uppercase;
      animation: pulse 1s ease-in-out infinite;
    }
    .zone-warning-sub { color: rgba(255,255,255,0.8); margin-top: 4px; font-size: 0.85rem; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

    /* === Kill feed === */
    .kill-feed {
      position: fixed; top: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 4px;
      pointer-events: none; z-index: 50;
    }
    .kill-entry {
      background: rgba(15,15,20,0.85); border: 1px solid rgba(60,60,80,0.4);
      border-radius: 4px; padding: 6px 10px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      animation: slideIn 0.3s ease-out; opacity: 0;
      transition: opacity 0.4s; white-space: nowrap;
    }
    .kill-entry.visible { opacity: 1; }
    @keyframes slideIn { from { transform: translateX(20px); } to { transform: translateX(0); } }
    .killer { color: #00b4ff; }
    .victim { color: #dc3232; }
    .weapon { color: #ff8c00; }

    /* === Squad status (top-left) === */
    .squad {
      position: absolute; top: 24px; left: 24px;
      display: flex; flex-direction: column; gap: 6px;
      pointer-events: none;
    }
    .squad-member {
      display: flex; align-items: center; gap: 8px;
      background: rgba(15,15,20,0.75); border: 1px solid rgba(60,60,80,0.3);
      border-radius: 4px; padding: 6px 10px;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      min-width: 160px;
    }
    .squad-avatar {
      width: 24px; height: 24px; border-radius: 3px;
      background: linear-gradient(135deg, #3c3c50, #1a1a2e);
      font-size: 11px; font-weight: 700; color: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .squad-info { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .squad-name {
      color: rgba(240,240,255,0.9); font-size: 11px; font-weight: 600;
    }
    .squad-hp {
      width: 100%; height: 4px; background: rgba(255,255,255,0.08);
      border-radius: 2px; overflow: hidden;
    }
    .squad-hp-fill { height: 100%; background: #00cc66; transition: width 0.3s; }
    .squad-hp-fill.med { background: #ff8800; }
    .squad-hp-fill.low { background: #dc3232; }
    .squad-status {
      font-size: 9px; color: rgba(160,160,180,0.6); text-transform: uppercase;
    }
    .squad-status.down { color: #dc3232; }

    /* === Interaction prompt === */
    .interaction-prompt {
      position: fixed; top: 55%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(15,15,20,0.9); border: 1px solid rgba(0,180,255,0.5);
      border-radius: 4px; padding: 12px 20px;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      pointer-events: none; opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 65; text-align: center;
    }
    .interaction-prompt.visible {
      opacity: 1; transform: translate(-50%, -100%);
    }
    .interaction-key {
      display: inline-block; background: #00b4ff; color: #0a0a0f;
      font-weight: 700; font-size: 11px; padding: 2px 8px;
      border-radius: 3px; margin-right: 6px; font-family: monospace;
    }
    .interaction-text {
      color: #fff; font-size: 13px; font-weight: 600;
      letter-spacing: 0.03em; text-transform: uppercase;
    }
    .interaction-sub {
      color: rgba(160,160,180,0.6); font-size: 10px; margin-top: 3px;
    }

    /* === Debug buttons === */
    .debug-controls {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 6px; z-index: 200; pointer-events: auto;
    }
    .debug-btn {
      background: rgba(15,15,20,0.9); border: 1px solid rgba(60,60,80,0.5);
      color: rgba(240,240,255,0.8); padding: 6px 12px; border-radius: 4px;
      font-size: 10px; font-family: monospace; cursor: pointer;
      backdrop-filter: blur(4px); transition: all 0.15s;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .debug-btn:hover { background: rgba(0,180,255,0.2); border-color: #00b4ff; }
    .debug-btn:active { transform: scale(0.95); }

    /* === Gas vignette === */
    #gas-vignette {
      position: fixed; inset: 0; z-index: 55;
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }

    /* === Low health overlay === */
    .low-health-overlay {
      position: fixed; inset: 0; z-index: 56; pointer-events: none;
      box-shadow: inset 0 0 120px rgba(220,30,30,0.4);
      opacity: 0; transition: opacity 0.3s;
    }
    .low-health-overlay.active { opacity: 1; animation: pulseRed 1.5s infinite; }

    /* === Reload text === */
    .reload-text {
      position: fixed; top: 62%; left: 50%;
      transform: translate(-50%, -50%);
      color: #ff8c00; font-size: 13px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      text-shadow: 0 0 8px rgba(255,140,0,0.4);
      opacity: 0; transition: opacity 0.15s;
      z-index: 65; pointer-events: none;
      font-family: 'JetBrains Mono', monospace;
    }
    .reload-text.visible { opacity: 1; }

    @media (max-width: 600px) {
      .radar { width: 110px; height: 110px; bottom: 200px; left: 12px; }
      .hud { bottom: 12px; left: 12px; right: 12px; }
      .hud-panel { padding: 6px 10px; }
      .stat-value { font-size: 16px; }
      .health-bar { width: 100px; }
      .squad-member { min-width: 120px; padding: 4px 8px; font-size: 10px; }
      .weapon-hud { padding: 6px 12px; bottom: 200px; }
      .ammo-display { font-size: 18px; }
      .debug-controls { display: none; }
    }

    /* === Mobile Controls === */
    #mobileControls { display: none; }
    body.touch #mobileControls { display: block; }

    .joystick-zone {
      position: fixed; bottom: 20px; left: 20px;
      width: 130px; height: 130px;
      pointer-events: auto; z-index: 210; touch-action: none;
    }
    .joystick-base {
      position: absolute; inset: 0; border-radius: 50%;
      background: rgba(15,15,20,0.5); border: 2px solid rgba(0,180,255,0.35);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .joystick-thumb {
      position: absolute; top: 35%; left: 35%; width: 30%; height: 30%;
      border-radius: 50%; background: rgba(0,180,255,0.55);
      border: 1px solid rgba(0,180,255,0.7);
      transition: background 0.15s;
    }
    .joystick-thumb.active { background: rgba(0,180,255,0.85); }

    .action-buttons {
      position: fixed; bottom: 24px; right: 20px;
      display: flex; align-items: flex-end; gap: 10px;
      pointer-events: none; z-index: 210;
    }
    .action-cluster { display: flex; flex-direction: column; gap: 10px; align-items: center; pointer-events: none; }
    .action-row { display: flex; gap: 10px; }
    .action-btn {
      width: 60px; height: 60px; border-radius: 50%;
      background: rgba(15,15,20,0.7); border: 1px solid rgba(60,60,80,0.5);
      color: rgba(240,240,255,0.85); font-size: 11px; font-weight: 700;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: auto; cursor: pointer; touch-action: manipulation;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      transition: transform 0.08s, background 0.15s;
      text-transform: uppercase; letter-spacing: 0.05em;
      user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active, .action-btn.held {
      transform: scale(0.92); background: rgba(0,180,255,0.3);
      border-color: #00b4ff; color: #fff;
    }
    .action-btn.fire {
      width: 76px; height: 76px; background: rgba(220,50,50,0.25);
      border-color: rgba(220,50,50,0.6); color: #ffa0a0; font-size: 10px;
    }
    .action-btn.fire:active, .action-btn.fire.held {
      background: rgba(220,50,50,0.6); color: #fff;
    }
    .action-icon { font-size: 18px; line-height: 1; margin-bottom: 2px; }
    .action-label { font-size: 9px; opacity: 0.85; }

    .look-zone {
      position: fixed; top: 0; right: 0; width: 60%; height: 70%;
      z-index: 150; touch-action: none; pointer-events: auto;
    }
    body.touch #app { height: 100vh; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="backdrop"></div>

  <!-- 3D background (Three.js renders FPS viewmodel here) -->
  <canvas id="bg3d" style="position:fixed;inset:0;z-index:1;display:block;"></canvas>

  <div id="loading">
    <div class="spinner"></div>
    <div style="color: #a0a0b0; font-size: 0.85rem;">Loading HUD Prototype...</div>
  </div>

  <div id="app"></div>

  <div id="ui">
    <!-- Squad status -->
    <div class="squad" id="squad"></div>

    <!-- Kill feed -->
    <div class="kill-feed" id="kill-feed"></div>

    <!-- Debug buttons -->
    <div class="debug-controls">
      <button class="debug-btn" onclick="simReload()">[R] Reload</button>
      <button class="debug-btn" onclick="simFire()">Fire</button>
      <button class="debug-btn" onclick="simDamage()">[G] Damage</button>
      <button class="debug-btn" onclick="simMedkit()">[H] Medkit</button>
      <button class="debug-btn" onclick="simPickup()">[E] Pickup</button>
      <button class="debug-btn" onclick="simKill()">[K] KillFeed</button>
      <button class="debug-btn" onclick="simToggleFireMode()">[B] Fire Mode</button>
      <button class="debug-btn" onclick="simToggleGas()">Toggle Gas</button>
    </div>

    <!-- Crosshair -->
    <div id="crosshair">
      <div class="ch-line ch-top"></div>
      <div class="ch-line ch-bottom"></div>
      <div class="ch-line ch-left"></div>
      <div class="ch-line ch-right"></div>
    </div>

    <!-- Interaction prompt -->
    <div class="interaction-prompt" id="interaction">
      <div><span class="interaction-key">E</span><span class="interaction-text" id="interaction-text">PICK UP M4A1 AMMO</span></div>
      <div class="interaction-sub" id="interaction-sub">5.56mm · 30 rounds</div>
    </div>

    <!-- Reload text -->
    <div class="reload-text" id="reload-text">RELOADING...</div>

    <!-- Empty alert -->
    <div class="reload-text" id="empty-alert" style="color:#dc3232;background:rgba(20,0,0,0.6);padding:6px 14px;border-radius:4px;border:1px solid rgba(220,50,50,0.5);">AMMO EMPTY - PRESS R TO RELOAD</div>

    <!-- Zone warning -->
    <div class="zone-warning" id="zone-warning">
      <div class="zone-warning-text">ZONE SHRINKING</div>
      <div class="zone-warning-sub" id="zone-warning-sub">Next phase in 30s</div>
    </div>

    <!-- Minimap/Radar -->
    <div class="radar">
      <div class="radar-north">N</div>
      <div class="radar-ping"></div>
      <canvas id="radar-canvas" width="360" height="360"></canvas>
    </div>

    <!-- HUD bottom bar -->
    <div class="hud">
      <div class="hud-panel">
        <div class="health-bar-wrap">
          <div class="stat">
            <span class="stat-label">Health</span>
            <span class="stat-value" id="hp">100</span>
          </div>
          <div class="health-bar"><div class="health-bar-fill" id="hp-bar-fill"></div></div>
        </div>
      </div>
      <div class="hud-panel">
        <div class="health-bar-wrap">
          <div class="stat">
            <span class="stat-label">Armor</span>
            <span class="stat-value" id="armor">0</span>
          </div>
          <div class="health-bar"><div class="health-bar-fill" id="armor-bar-fill" style="background:linear-gradient(90deg,#5c5cff,#3c3ccc);width:50%"></div></div>
        </div>
      </div>
      <div class="hud-panel">
        <div class="stat"><span class="stat-label">Zone</span><span class="stat-value" id="zone-phase">1</span></div>
      </div>
      <div class="hud-panel">
        <div class="stat"><span class="stat-label">Alive</span><span class="stat-value" id="alive">100</span></div>
      </div>
    </div>

    <!-- Weapon HUD -->
    <div class="weapon-hud">
      <div>
        <div class="ammo-display">
          <span class="ammo-current" id="ammo-current">30</span><span class="ammo-divider"> / </span><span class="ammo-total" id="ammo-total">30</span>
        </div>
        <div style="display:flex; gap:8px; align-items:center;">
          <span class="fire-mode" id="fire-mode">AUTO</span>
          <span class="weapon-name" id="weapon-name">AK-74</span>
        </div>
      </div>
    </div>

    <div class="low-health-overlay" id="low-health"></div>
  </div>

  <div id="gas-vignette"></div>

  <!-- Mobile Controls (only on touch devices) -->
  <div id="mobileControls">
    <!-- Look zone (right 60% of screen for camera drag) -->
    <div class="look-zone" id="lookZone"></div>

    <!-- Virtual Joystick (bottom-left) -->
    <div class="joystick-zone" id="leftJoystick">
      <div class="joystick-base"></div>
      <div class="joystick-thumb" id="joystickThumb"></div>
    </div>

    <!-- Action Buttons (bottom-right) -->
    <div class="action-buttons">
      <div class="action-cluster">
        <div class="action-row">
          <button class="action-btn" id="reloadBtn">
            <span class="action-icon">⟲</span><span class="action-label">Reload</span>
          </button>
          <button class="action-btn" id="jumpBtn">
            <span class="action-icon">⤴</span><span class="action-label">Jump</span>
          </button>
        </div>
        <div class="action-row">
          <button class="action-btn" id="crouchBtn">
            <span class="action-icon">▼</span><span class="action-label">Crouch</span>
          </button>
          <button class="action-btn fire" id="fireBtn">
            <span class="action-icon">●</span><span class="action-label">Fire</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Capture errors before bundle executes
    window.__errors = [];
    window.addEventListener('error', function(e) {
      window.__errors.push({
        msg: e.message,
        filename: e.filename,
        line: e.lineno,
        col: e.colno,
        stack: e.error ? (e.error.stack || e.error.message) : 'no err obj'
      });
    });
    window.addEventListener('unhandledrejection', function(e) {
      window.__errors.push({
        type: 'promise',
        reason: String(e.reason),
        stack: e.reason && e.reason.stack ? e.reason.stack : ''
      });
    });
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
